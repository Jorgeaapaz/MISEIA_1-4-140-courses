name: CI/CD — Test, Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Job 1: Lint + Unit Tests ────────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Jest unit tests
        run: npm test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret-for-ci-minimum-32-chars' }}

  # ── Job 2: Production Build ─────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: NODE_ENV=production npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  # ── Job 3: Deploy to GCI VM ─────────────────────────────────────────────────
  deploy:
    name: Deploy to GCI VM
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Write production env file for transfer
        run: |
          cat > .env.production << 'EOF'
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          MONGODB_DB=saas-cursos
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          MAILHOG_HOST=mailhog
          MAIL_PORT=1025
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          NODE_ENV=production
          AWS_USERNAME=${{ secrets.AWS_USERNAME }}
          AWS_PASSWORD=${{ secrets.AWS_PASSWORD }}
          AWS_REGION=us-east-1
          AWS_URL=http://rustfs:9000
          AWS_BUCKET=saas-cursos-bucket
          EOF

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Transfer env file to VM
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            .env.production \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/MISEIA1-4-140-courses/.env.production

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'REMOTE'
          set -e
          APP_DIR=~/MISEIA1-4-140-courses
          mkdir -p "$APP_DIR"
          cd "$APP_DIR"

          if [ -d ".git" ]; then
            git pull origin master
          else
            git clone https://github.com/Jorgeaapaz/MISEIA_1-4-140-courses.git .
          fi

          docker build -t coursehub:latest .
          docker compose -f docker-compose.courses.yml down || true
          docker compose -f docker-compose.courses.yml up -d

          echo "Deploy complete — coursehub container status:"
          docker ps | grep coursehub || echo "WARNING: container not found"
          REMOTE
