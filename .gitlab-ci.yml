stages:
  - test
  - build
  - deploy

default:
  image: node:20-alpine

cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
    - node_modules/
    - .npm/

# ── Stage: test ───────────────────────────────────────────────────────────────
lint_and_test:
  stage: test
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run lint
    - npm test
  variables:
    JWT_SECRET: "test-secret-for-ci-minimum-32-chars-gitlab"
  artifacts:
    when: always
    paths:
      - coverage/
    expire_in: 7 days

# ── Stage: build ──────────────────────────────────────────────────────────────
build_production:
  stage: build
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - NODE_ENV=production npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 hour
  only:
    - master

# ── Stage: deploy ─────────────────────────────────────────────────────────────
deploy_to_vm:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - cp "$SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    # Write .env.production in the runner where CI variables are available
    - |
      cat > .env.production << EOF
      MONGODB_URI=${MONGODB_URI}
      MONGODB_DB=saas-cursos
      JWT_SECRET=${JWT_SECRET}
      MAILHOG_HOST=mailhog
      MAIL_PORT=1025
      NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      NODE_ENV=production
      AWS_USERNAME=${AWS_USERNAME}
      AWS_PASSWORD=${AWS_PASSWORD}
      AWS_REGION=us-east-1
      AWS_URL=http://rustfs:9000
      AWS_BUCKET=saas-cursos-bucket
      EOF
    # Clone or pull repo on VM
    - |
      ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "${VM_USER}@${VM_HOST}" \
        "APP_DIR=~/MISEIA1-4-140-courses; \
         if [ -d \"\$APP_DIR/.git\" ]; then \
           cd \"\$APP_DIR\" && git pull origin master; \
         else \
           rm -rf \"\$APP_DIR\"; \
           git clone https://github.com/Jorgeaapaz/MISEIA_1-4-140-courses.git \"\$APP_DIR\"; \
         fi"
    # Transfer env file
    - scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no .env.production "${VM_USER}@${VM_HOST}:~/MISEIA1-4-140-courses/.env.production"
    # Build and deploy
    - |
      ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "${VM_USER}@${VM_HOST}" << 'REMOTE'
      set -e
      cd ~/MISEIA1-4-140-courses
      docker build -t coursehub:latest .
      docker compose -f docker-compose.courses.yml down || true
      docker compose -f docker-compose.courses.yml up -d
      echo "Deploy complete:"
      docker ps | grep coursehub || echo "WARNING: container not found"
      REMOTE
  only:
    - master
  environment:
    name: production
    url: https://courses.deviaaps.com
