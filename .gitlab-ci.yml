stages:
  - test
  - build
  - deploy

default:
  image: node:20-alpine

cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
    - node_modules/
    - .npm/

# ── Stage: test ───────────────────────────────────────────────────────────────
lint_and_test:
  stage: test
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run lint
    - npm test
  variables:
    JWT_SECRET: "test-secret-for-ci-minimum-32-chars-gitlab"
  artifacts:
    when: always
    reports:
      junit: junit.xml
    paths:
      - coverage/
    expire_in: 7 days

# ── Stage: build ──────────────────────────────────────────────────────────────
build_production:
  stage: build
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - NODE_ENV=production npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 hour
  only:
    - master

# ── Stage: deploy ─────────────────────────────────────────────────────────────
deploy_to_vm:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "${VM_USER}@${VM_HOST}" << 'REMOTE'
        set -e
        APP_DIR=~/MISEIA1-4-140-courses
        mkdir -p "$APP_DIR"
        cd "$APP_DIR"

        if [ -d ".git" ]; then
          git pull origin master
        else
          git clone https://gitlab.codecrypto.academy/$CI_PROJECT_PATH .
        fi

        cat > .env.production << ENVEOF
        MONGODB_URI=${MONGODB_URI}
        MONGODB_DB=saas-cursos
        JWT_SECRET=${JWT_SECRET}
        MAILHOG_HOST=mailhog
        MAIL_PORT=1025
        NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        NODE_ENV=production
        AWS_USERNAME=${AWS_USERNAME}
        AWS_PASSWORD=${AWS_PASSWORD}
        AWS_REGION=us-east-1
        AWS_URL=http://rustfs:9000
        AWS_BUCKET=saas-cursos-bucket
        ENVEOF

        docker build -t coursehub:latest .
        docker-compose -f docker-compose.courses.yml down || true
        docker-compose -f docker-compose.courses.yml up -d

        docker ps | grep coursehub
      REMOTE
  only:
    - master
  environment:
    name: production
    url: https://courses.deviaaps.com
